<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Tech Library Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code&display=optional" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0b14;
      color: #d4d4de;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 50% -20%, rgba(102,126,234,0.08) 0%, transparent 60%);
    }
    .login-box {
      background: #12121f;
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 400px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo .icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.6rem;
      color: #fff;
      box-shadow: 0 8px 24px rgba(102,126,234,0.3);
    }
    .logo h1 { font-size: 1.3rem; font-weight: 700; }
    .logo p { color: #8888a0; font-size: 0.85rem; margin-top: 4px; }
    .error-box {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #8888a0;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0b0b14;
      color: #d4d4de;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #667eea; }
    .form-group input::placeholder { color: #606078; }
    .submit-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s;
    }
    .submit-btn:hover { filter: brightness(1.08); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn i { margin-right: 6px; }
    .footer { text-align: center; margin-top: 20px; font-size: 0.78rem; color: #606078; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="icon"><i class="fas fa-cube"></i></div>
      <h1>Admin Panel</h1>
      <p>Tech Library — content management</p>
    </div>
    {% if error %}
    <div class="error-box"><i class="fas fa-exclamation-circle"></i> Invalid username or password</div>
    {% endif %}
    <form method="POST" autocomplete="off">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="submit-btn"><i class="fas fa-lock"></i> Sign In</button>
    </form>
    <div class="footer">Tech Library v2 &mdash; Admin Panel</div>
  </div>
</body>
</html>
